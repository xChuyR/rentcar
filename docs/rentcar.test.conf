# ============================================================
# RentCar v3 — Virtual Host para Laragon
# ============================================================
# Guardar en: C:\laragon\etc\apache2\sites-enabled\rentcar.test.conf
# Ajusta las rutas si tu Laragon está en una ubicación diferente.
# Después de guardar: reiniciar Apache en Laragon.
# ============================================================

<VirtualHost *:80>
    ServerName rentcar.test
    ServerAlias www.rentcar.test

    # Frontend Vue compilado (npm run build → frontend/dist/)
    DocumentRoot "C:/laragon/www/rentcar/frontend/"

    <Directory "C:/laragon/www/rentcar/frontend">
        Options -Indexes
        AllowOverride All
        Require all granted
        # SPA fallback: rutas como /login, /servicios, /admin
        # las maneja Vue Router (no deben dar 404 en Apache)
        FallbackResource /index.html
    </Directory>

    # ── API PHP ──────────────────────────────────────────────
    # Mapea /api → backend/public/
    Alias "/api" "C:/laragon/www/rentcar/backend/public"

    <Directory "C:/laragon/www/rentcar/backend/public">
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # ── Uploads ──────────────────────────────────────────────
    Alias "/uploads" "C:/laragon/www/rentcar/backend/public/uploads"

    <Directory "C:/laragon/www/rentcar/backend/public/uploads">
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # ── Logs ─────────────────────────────────────────────────
    ErrorLog "C:/laragon/www/rentcar/apache-error.log"
    CustomLog "C:/laragon/www/rentcar/apache-access.log" combined
</VirtualHost>